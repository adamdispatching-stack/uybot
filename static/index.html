<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c0e13">
<title>UyWeb</title>
<style>
:root{
  color-scheme:dark;
  --bg:#0c0e13; --card:#151922; --card2:#1b202c; --chart:#1a1d24;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.12);
  --text:#f2f4f8; --sec:#9aa3b2; --muted:#79808f;
  --gold:#d4af37; --gold-2:#e8c964; --gold-ink:#1a1408;
  --emerald:#34d399; --red:#f87171; --amber:#fbbf24;
  --blue:#3987e5; --orange:#d95926; --neg:#e66767; --gray-seg:#3a4150;
  --grid:#2c2c2a; --radius:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);font-size:16px;
  padding-bottom:calc(74px + env(safe-area-inset-bottom))}
h1,h2,h3{margin:0}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px;width:100%;padding:12px 13px;
  border:1.5px solid var(--border2);border-radius:11px;background:var(--card2);
  color:var(--text);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input::placeholder{color:var(--muted)}
label{display:block;font-size:12.5px;font-weight:600;color:var(--sec);margin:13px 0 5px;
  text-transform:uppercase;letter-spacing:.5px}
a{color:var(--gold-2)}
.hide{display:none!important}

header{position:sticky;top:0;z-index:20;
  background:linear-gradient(180deg,#12151d 0%,#0e1118 100%);
  border-bottom:1px solid var(--border);
  padding:calc(13px + env(safe-area-inset-top)) 18px 13px;
  display:flex;justify-content:space-between;align-items:center}
header .title{font-size:19px;font-weight:800;letter-spacing:.3px}
header .title .accent{color:var(--gold)}
.lang-btn{background:rgba(212,175,55,.14);border:1px solid rgba(212,175,55,.35);
  color:var(--gold-2);border-radius:20px;padding:6px 14px;font-size:13.5px;font-weight:700}

nav{position:fixed;bottom:0;left:0;right:0;z-index:20;background:#12151d;
  border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;padding:9px 0 7px;font-size:10.5px;
  color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;
  font-weight:600;letter-spacing:.2px}
nav button .ico{font-size:21px;filter:grayscale(1) opacity(.55)}
nav button.active{color:var(--gold-2)}
nav button.active .ico{filter:none}

main{padding:16px 14px 20px;max-width:640px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:15px;margin-bottom:11px}
.card.tap:active{transform:scale(.99);border-color:var(--border2)}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.muted{color:var(--sec);font-size:13.5px}
.big{font-size:17.5px;font-weight:700;line-height:1.3}
.chip{display:inline-block;font-size:11.5px;font-weight:700;padding:3.5px 10px;
  border-radius:20px;letter-spacing:.2px}
.chip.green{background:rgba(52,211,153,.14);color:var(--emerald)}
.chip.blue{background:rgba(57,135,229,.16);color:#7ab2f2}
.chip.red{background:rgba(248,113,113,.14);color:var(--red)}
.chip.amber{background:rgba(251,191,36,.13);color:var(--amber)}
.chip.gray{background:rgba(255,255,255,.08);color:var(--sec)}
.chip.gold{background:rgba(212,175,55,.15);color:var(--gold-2)}

.toolbar{display:flex;gap:8px;margin-bottom:10px}
.toolbar input{flex:1}
.toolbar select{width:auto;min-width:118px}
.filters{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;-webkit-overflow-scrolling:touch;
  scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filters button{white-space:nowrap;border:1px solid var(--border2);background:var(--card);
  border-radius:20px;padding:7.5px 15px;font-size:13.5px;font-weight:600;color:var(--sec)}
.filters button.active{background:var(--gold);border-color:var(--gold);color:var(--gold-ink)}

.btn{display:block;width:100%;background:var(--gold);color:var(--gold-ink);border:none;
  border-radius:12px;padding:14px;font-size:15.5px;font-weight:800;margin-top:16px;
  letter-spacing:.2px}
.btn:active{background:var(--gold-2)}
.btn.secondary{background:transparent;color:var(--gold-2);border:1.5px solid rgba(212,175,55,.5)}
.btn.danger{background:transparent;color:var(--red);border:1.5px solid rgba(248,113,113,.45)}
.btn.small{width:auto;display:inline-block;padding:9px 15px;font-size:13.5px;margin-top:0}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px}
.btn-row .btn{margin-top:0;flex:1;min-width:128px}

.fab{position:fixed;right:18px;bottom:calc(86px + env(safe-area-inset-bottom));z-index:19;
  width:58px;height:58px;border-radius:50%;background:var(--gold);color:var(--gold-ink);
  border:none;font-size:30px;box-shadow:0 6px 20px rgba(212,175,55,.35);line-height:1}

.sheet{position:fixed;inset:0;z-index:40;background:var(--bg);overflow-y:auto;
  padding-bottom:44px;animation:up .18s ease-out}
@keyframes up{from{transform:translateY(28px);opacity:.5}to{transform:none;opacity:1}}
.sheet .bar{position:sticky;top:0;z-index:5;background:#12151d;border-bottom:1px solid var(--border);
  padding:calc(12px + env(safe-area-inset-top)) 14px 12px;display:flex;align-items:center;gap:10px}
.sheet .bar button{background:none;border:none;color:var(--gold-2);font-size:24px;padding:0 4px}
.sheet .bar .title{font-size:16.5px;font-weight:700;flex:1;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.sheet .inner{padding:15px 14px;max-width:640px;margin:0 auto}

.modal-bg{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.62);display:flex;
  align-items:flex-end;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border2);border-bottom:none;
  border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:88vh;overflow-y:auto;
  padding:20px 16px calc(26px + env(safe-area-inset-bottom));animation:up .18s ease-out}
.modal h3{font-size:17px;margin-bottom:2px}

.seg{display:flex;gap:8px}
.seg button{flex:1;border:1.5px solid var(--border2);background:var(--card2);border-radius:10px;
  padding:11px;font-size:14.5px;font-weight:600;color:var(--sec)}
.seg button.active{border-color:var(--gold);color:var(--gold-2);background:rgba(212,175,55,.1)}

.list-line{padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.list-line:last-child{border-bottom:none}
.section-title{font-size:12.5px;font-weight:800;color:var(--muted);margin:20px 0 9px;
  text-transform:uppercase;letter-spacing:1px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 15px}
.stat .n{font-size:27px;font-weight:800;line-height:1.15}
.stat .l{font-size:12px;color:var(--sec);font-weight:600;margin-top:3px}
.empty{color:var(--muted);text-align:center;padding:36px 10px;font-size:15px;white-space:pre-line}
.toast{position:fixed;left:50%;transform:translateX(-50%);z-index:99;
  bottom:calc(92px + env(safe-area-inset-bottom));background:#f2f4f8;color:#12151d;
  padding:11px 20px;border-radius:24px;font-size:14px;font-weight:700;
  box-shadow:0 6px 18px rgba(0,0,0,.5);max-width:88vw}
.login-wrap{max-width:390px;margin:0 auto;padding:64px 24px}
.login-wrap .logo{text-align:center;font-size:46px}
.login-wrap h1{text-align:center;font-size:24px;margin:10px 0 4px;font-weight:800}
.login-wrap .sub{text-align:center;color:var(--muted);font-size:13.5px;margin-bottom:26px}
.err{color:var(--red);font-size:14px;margin-top:12px;text-align:center}

/* houses list */
.hcard{display:flex;gap:12px;align-items:stretch}
.hthumb{width:66px;min-width:66px;height:66px;border-radius:12px;object-fit:cover;
  border:1px solid var(--border2)}
.hthumb.ph{display:flex;align-items:center;justify-content:center;font-size:26px;
  background:var(--card2)}

/* gallery */
.gallery{display:flex;gap:9px;overflow-x:auto;padding:2px 0;-webkit-overflow-scrolling:touch;
  scrollbar-width:none}
.gallery::-webkit-scrollbar{display:none}
.gallery img{width:96px;height:96px;min-width:96px;object-fit:cover;border-radius:12px;
  border:1px solid var(--border2)}
.gallery .addph{width:96px;height:96px;min-width:96px;border-radius:12px;
  border:1.5px dashed rgba(212,175,55,.5);background:none;color:var(--gold-2);font-size:26px}
.viewer{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.93);display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px}
.viewer img{max-width:100%;max-height:74vh;border-radius:12px}
.viewer .vbtns{display:flex;gap:10px}

/* charts */
.viz-root{background:var(--chart);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 14px 10px;margin-bottom:11px}
.viz-root .vtitle{font-size:13.5px;font-weight:700;margin-bottom:2px}
.viz-root .vsub{font-size:12px;color:var(--muted);margin-bottom:10px}
.legend{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
.legend .li{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--sec);
  font-weight:600}
.legend .sw{width:10px;height:10px;border-radius:3px}
.bar-hit{cursor:pointer}
#tip{position:fixed;z-index:98;background:#232936;border:1px solid var(--border2);
  border-radius:10px;padding:8px 12px;font-size:12.5px;pointer-events:none;
  box-shadow:0 6px 18px rgba(0,0,0,.45);display:none;line-height:1.5}
.nrow{display:flex;align-items:center;gap:10px;padding:6px 0}
.nrow .nname{width:38%;min-width:38%;font-size:12.5px;color:var(--sec);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.nrow .ntrack{flex:1;display:flex;align-items:center;gap:8px}
.nrow .nbar{height:14px;border-radius:0 4px 4px 0;min-width:3px}
.nrow .nval{font-size:12px;font-weight:700;white-space:nowrap}
</style>
</head>

<div id="authView" class="hide">
  <div class="login-wrap">
    <div class="logo">🏠</div>
    <h1>Uy<span style="color:var(--gold)">Web</span></h1>
    <div class="sub">Tashkent Real Estate Manager</div>
    <div id="setupHint" class="muted hide" style="text-align:center;margin-bottom:14px"></div>
    <label data-i18n="username"></label>
    <input id="authUser" autocomplete="username">
    <label data-i18n="password"></label>
    <input id="authPass" type="password" autocomplete="current-password">
    <div id="authNameWrap" class="hide">
      <label data-i18n="your_name"></label>
      <input id="authName">
    </div>
    <button class="btn" id="authBtn"></button>
    <div id="authErr" class="err hide"></div>
    <div style="text-align:center;margin-top:24px">
      <button class="lang-btn" onclick="toggleLang()">RU / UZ</button>
    </div>
  </div>
</div>

<div id="mainView" class="hide">
  <header>
    <div class="title">🏠 Uy<span class="accent">Web</span></div>
    <button class="lang-btn" onclick="toggleLang()"><span id="langLabel">UZ</span></button>
  </header>
  <main id="content"></main>
  <button class="fab hide" id="fab" onclick="openHouseForm()">+</button>
  <nav>
    <button id="tab-houses" onclick="setTab('houses')"><span class="ico">🏠</span><span data-i18n="tab_houses"></span></button>
    <button id="tab-tenants" onclick="setTab('tenants')"><span class="ico">👥</span><span data-i18n="tab_tenants"></span></button>
    <button id="tab-tasks" onclick="setTab('tasks')"><span class="ico">📋</span><span data-i18n="tab_tasks"></span></button>
    <button id="tab-reports" onclick="setTab('reports')"><span class="ico">📊</span><span data-i18n="tab_reports"></span></button>
    <button id="tab-settings" onclick="setTab('settings')"><span class="ico">⚙️</span><span data-i18n="tab_settings"></span></button>
  </nav>
</div>

<div id="overlays"></div>
<div id="tip"></div>

function applyI18n(){

function fmt(a, cur){
  if (a === null || a === undefined) return "—";
  const n = a === Math.trunc(a) ? Math.trunc(a).toLocaleString("ru-RU")
        : a.toLocaleString("ru-RU",{maximumFractionDigits:2});
  return cur === "USD" ? "$" + n : n + " " + t("sum");
}
function fmtC(v){ // compact for chart axes
  const a = Math.abs(v);
  if (a >= 1e9) return (v/1e9).toFixed(1).replace(/\.0$/,"") + "B";
  if (a >= 1e6) return (v/1e6).toFixed(1).replace(/\.0$/,"") + "M";
  if (a >= 1e3) return (v/1e3).toFixed(0) + "K";
  return "" + Math.round(v);
}
function fmtDate(iso){
  if (!iso) return "—";
  const [y,m,d] = iso.slice(0,10).split("-");
  return `${d}.${m}.${y}`;
}
function esc(s){ return (s ?? "").toString().replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function moneyList(rows){ return rows && rows.length
  ? rows.map(r => fmt(r.total, r.currency)).join(" + ") : "—"; }

async function api(path, method="GET", body=null){
  const opt = { method, headers:{} };
  if (body){ opt.headers["Content-Type"]="application/json"; opt.body = JSON.stringify(body); }
  const r = await fetch(path, opt);
  let data = {};
  try { data = await r.json(); } catch(e){}
  if (!r.ok) throw new Error(data.error || t("error"));
  return data;
}
async function apiUpload(path, formData){
  const r = await fetch(path, { method:"POST", body: formData });
  let data = {};
  try { data = await r.json(); } catch(e){}
  if (!r.ok) throw new Error(data.error || t("error"));
  return data;
}

let toastTimer;
function toast(msg){
  document.querySelectorAll(".toast").forEach(e=>e.remove());
  const el = document.createElement("div");
  el.className = "toast"; el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.remove(), 2400);
}

function closeModal(){ document.querySelectorAll(".modal-bg").forEach(e=>e.remove()); }
function closeSheet(){ document.querySelectorAll(".sheet").forEach(e=>e.remove()); }
function closeViewer(){ document.querySelectorAll(".viewer").forEach(e=>e.remove()); }

  closeModal();

function segInit(id, def){
  const wrap = document.getElementById(id);
  if (!wrap) return;
  wrap.querySelectorAll("button").forEach(b => {
    if (b.dataset.v === def) b.classList.add("active");
    b.onclick = () => { wrap.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active"); };
  });
}

function currencySeg(id){

    <button type="button" data-v="UZS">UZS (${t("sum")})</button>
    <button type="button" data-v="USD">USD ($)</button></div>`;
}
function monthOptions(){
  const now = new Date(); let out = "";
  for (let off = 1; off >= -10; off--){
    const d = new Date(now.getFullYear(), now.getMonth() + off, 1);
    const v = `${d.getFullYear()}-${d.getMonth()+1}`;
    out += `<option value="${v}" ${off===0?"selected":""}>${t("months")[d.getMonth()]} ${d.getFullYear()}</option>`;
  }
  return out;
}

/* tooltip */
const tip = document.getElementById("tip");
function showTip(html, x, y){
  tip.innerHTML = html; tip.style.display = "block";
  const w = tip.offsetWidth, ww = window.innerWidth;
  let left = x - w/2; left = Math.max(8, Math.min(left, ww - w - 8));
  tip.style.left = left + "px";
  tip.style.top = Math.max(8, y - tip.offsetHeight - 14) + "px";
}
function hideTip(){ tip.style.display = "none"; }
document.addEventListener("touchstart", e => { if (!e.target.closest(".bar-hit")) hideTip(); });

      STATE.user = s.user;
      if (s.user.lang && s.user.lang !== LANG){ LANG = s.user.lang; localStorage.setItem("uyweb_lang", LANG); }

document.getElementById("authBtn").onclick = async () => {
  const u = document.getElementById("authUser").value.trim();
  const p = document.getElementById("authPass").value;
  const err = document.getElementById("authErr");
  err.classList.add("hide");
  try {
    if (NEEDS_SETUP)
      await api("/api/setup","POST",{username:u,password:p,name:document.getElementById("authName").value.trim()||null});

async function renderHouses(){
  const c = document.getElementById("content");
  const filters = ["all","sale","rent_free","rented","sold"];
  c.innerHTML = `
    <div class="toolbar">
      <input id="hsearch" placeholder="${esc(t("search_ph"))}" value="${esc(STATE.q)}">

        <option value="new" ${STATE.sort==='new'?'selected':''}>${t("sort_new")}</option>

        <option value="price_asc" ${STATE.sort==='price_asc'?'selected':''}>${t("sort_price_asc")}</option>
      </select>
    </div>
    <div class="filters">` + filters.map(f =>
      `<button class="${STATE.filter===f?'active':''}" onclick="STATE.filter='${f}';renderHouses()">${t("f_"+f)}</button>`
    ).join("") + `</div><div id="houseList"><div class="empty">…</div></div>`;

  });

  catch(e){ toast(e.message); return; }

function drawHouseList(){
  const list = document.getElementById("houseList");
  if (!list) return;
  let houses = [...STATE.houses];
  const q = STATE.q.trim().toLowerCase();
  if (q) houses = houses.filter(h =>
    (h.address||"").toLowerCase().includes(q) ||
    (h.district||"").toLowerCase().includes(q) ||
    (h.owner_name||"").toLowerCase().includes(q) ||
    (h.tenant_name||"").toLowerCase().includes(q));
  if (STATE.sort === "price_desc") houses.sort((a,b)=>(b.purchase_price??-1)-(a.purchase_price??-1));
  if (STATE.sort === "price_asc") houses.sort((a,b)=>(a.purchase_price??1e18)-(b.purchase_price??1e18));
  if (!houses.length){
    list.innerHTML = `<div class="empty">${esc(q ? t("nothing_found") : t("no_houses"))}</div>`;
    return;
  }
  list.innerHTML = houses.map(h => {
    const thumb = h.thumb
      ? `<img class="hthumb" src="/photos/${h.thumb}" alt="" loading="lazy">`
      : `<div class="hthumb ph">🏠</div>`;
    let extra = "";
    if (h.tenant_name){
      extra = `<div class="muted" style="margin-top:6px">👤 ${esc(h.tenant_name)} · ${fmt(h.rent_amount,h.rent_currency)}
        <span class="chip ${h.paid_this_month?'green':'red'}" style="margin-left:4px">${h.paid_this_month?t("paid"):t("not_paid")}</span></div>`;
    } else if (h.purchase_price){
      extra = `<div class="muted" style="margin-top:6px">💰 ${fmt(h.purchase_price,h.purchase_currency)}</div>`;
    }
    return `<div class="card tap hcard" onclick="openHouse(${h.id})">
      ${thumb}
      <div style="flex:1;min-width:0">
        <div class="big">${esc(h.address)}</div>
        ${h.district?`<div class="muted">${esc(h.district)}</div>`:""}
        <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
          <span class="chip ${h.deal_type==='sale'?'gold':'blue'}">${t("deal_"+h.deal_type)}</span>
          <span class="chip ${ST_CHIP[h.status]}">${t("st_"+h.status)}</span></div>
        ${extra}
      </div></div>`;
  }).join("");
}

function galleryHtml(h){

  return `<div class="gallery">${shots}

function openViewer(filename, pid, hid){

  const v = document.createElement("div");
  v.className = "viewer";
  v.innerHTML = `<img src="/photos/${filename}">
    <div class="vbtns">
      <button class="btn small secondary" onclick="closeViewer()">${t("cancel")}</button>
      <button class="btn small danger" onclick="delPhoto(${pid},${hid})">🗑 ${t("delete")}</button>
    </div>`;
  v.addEventListener("click", e => { if (e.target === v) closeViewer(); });
  document.getElementById("overlays").appendChild(v);

async function uploadPhoto(input, hid){
  const files = Array.from(input.files || []);
  if (!files.length) return;
  let done = 0, failed = 0;
  for (const file of files){
    toast(`${t("uploading")} ${done+1}/${files.length}`);
    try {
      const blob = await compressImage(file);
      const fd = new FormData();
      fd.append("file", blob, "photo.jpg");
      await apiUpload(`/api/houses/${hid}/photos`, fd);
      done++;
    } catch(e){ failed++; }
  }
  input.value = "";
  toast(failed ? `${t("added")} ${done}/${files.length}` : t("added"));
  refreshHouse(hid);
}
function compressImage(file){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1600;
      let {width:w, height:h} = img;
      if (Math.max(w,h) > MAX){ const k = MAX/Math.max(w,h); w = Math.round(w*k); h = Math.round(h*k); }
      const cv = document.createElement("canvas");
      cv.width = w; cv.height = h;
      cv.getContext("2d").drawImage(img, 0, 0, w, h);
      cv.toBlob(b => b ? resolve(b) : reject(new Error(t("error"))), "image/jpeg", .85);
      URL.revokeObjectURL(img.src);
    };
    img.onerror = () => reject(new Error(t("error")));
    img.src = URL.createObjectURL(file);
  });
}
async function delPhoto(pid, hid){
  if (!confirm(t("delete_photo_q"))) return;
  try { await api("/api/photos/"+pid,"DELETE"); refreshHouse(hid); } catch(e){ toast(e.message); }

/* ================= charts (validated palette on dark surface) ================= */
const CH = { income:"#3987e5", expense:"#d95926", neg:"#e66767", gray:"#3a4150",
             grid:"#2c2c2a", axis:"#383835", label:"#898781" };

function roundTopBar(x, y, w, h, r){
  if (h <= 0) return "";
  r = Math.min(r, w/2, h);
  return `M${x},${y+h} L${x},${y+r} Q${x},${y} ${x+r},${y} L${x+w-r},${y}
          Q${x+w},${y} ${x+w},${y+r} L${x+w},${y+h} Z`;
}

function ieChart(monthly, cur){
  const W = 360, H = 190, padL = 34, padR = 6, padT = 16, padB = 24;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const vals = monthly.flatMap(m => [m.income[cur]||0, m.expense[cur]||0]);
  const max = Math.max(...vals, 1);
  const groupW = plotW / 12, barW = Math.min(9, (groupW - 6) / 2);
  let bars = "", hits = "", maxLabel = "";
  let peak = {v:-1};
  monthly.forEach((m, i) => {
    const gx = padL + i * groupW + (groupW - barW*2 - 2) / 2;
    const iv = m.income[cur]||0, ev = m.expense[cur]||0;
    const ih = iv/max*plotH, eh = ev/max*plotH;
    bars += `<path d="${roundTopBar(gx, padT+plotH-ih, barW, ih, 4)}" fill="${CH.income}"/>`;
    bars += `<path d="${roundTopBar(gx+barW+2, padT+plotH-eh, barW, eh, 4)}" fill="${CH.expense}"/>`;
    if (iv > peak.v) peak = {v:iv, x:gx+barW/2, y:padT+plotH-ih};
    const label = `${t("months_s")[m.month-1]} ${String(m.year).slice(2)}`;
    hits += `<rect class="bar-hit" x="${padL+i*groupW}" y="${padT}" width="${groupW}" height="${plotH}"
      fill="transparent" data-tip="${esc(`<b>${t("months")[m.month-1]} ${m.year}</b><br>
        ${t("income")}: ${fmt(iv,cur)}<br>${t("month_exp")}: ${fmt(ev,cur)}`)}"/>`;
    if (i % 2 === 0) bars += `<text x="${padL+i*groupW+groupW/2}" y="${H-8}" fill="${CH.label}"
      font-size="9.5" text-anchor="middle">${label}</text>`;
  });
  if (peak.v > 0) maxLabel = `<text x="${peak.x}" y="${Math.max(10,peak.y-5)}" fill="var(--sec)"
    font-size="10" font-weight="700" text-anchor="middle">${fmtC(peak.v)}</text>`;
  let grid = "";
  [0, .5, 1].forEach(f => {
    const y = padT + plotH - f*plotH;
    grid += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}"
      stroke="${f===0?CH.axis:CH.grid}" stroke-width="1"/>`;
    if (f > 0) grid += `<text x="${padL-5}" y="${y+3.5}" fill="${CH.label}" font-size="9.5"
      text-anchor="end">${fmtC(max*f)}</text>`;
  });
  return `<div class="viz-root">
    <div class="vtitle">${t("chart_ie")} — ${cur === "USD" ? "USD" : "UZS"}</div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${grid}${bars}${maxLabel}${hits}</svg>
    <div class="legend">
      <span class="li"><span class="sw" style="background:${CH.income}"></span>${t("income")}</span>
      <span class="li"><span class="sw" style="background:${CH.expense}"></span>${t("month_exp")}</span>
    </div></div>`;
}

function occupancyChart(occ){
  const total = occ.rented + occ.free;
  if (!total) return "";
  const R = 40, CW = 14, C = 2 * Math.PI * R;
  const gap = total > 1 && occ.rented > 0 && occ.free > 0 ? 3 : 0;
  const rentLen = C * occ.rented / total - gap;
  const freeLen = C * occ.free / total - gap;
  const pct = Math.round(100 * occ.rented / total);
  let segs = `<circle cx="60" cy="60" r="${R}" fill="none" stroke="${CH.gray}" stroke-width="${CW}"/>`;
  if (occ.rented > 0) segs += `<circle cx="60" cy="60" r="${R}" fill="none" stroke="${CH.income}"
    stroke-width="${CW}" stroke-dasharray="${Math.max(rentLen,0)} ${C}" stroke-dashoffset="0"
    transform="rotate(-90 60 60)" stroke-linecap="butt"/>`;
  return `<div class="viz-root">
    <div class="vtitle">${t("occupancy")}</div>
    <div style="display:flex;align-items:center;gap:18px">
      <svg viewBox="0 0 120 120" width="116" style="flex-shrink:0">${segs}
        <text x="60" y="58" fill="var(--text)" font-size="22" font-weight="800" text-anchor="middle">${pct}%</text>
        <text x="60" y="74" fill="${CH.label}" font-size="9.5" text-anchor="middle">${t("occupied")}</text>
      </svg>
      <div class="legend" style="flex-direction:column;gap:9px;margin-top:0">
        <span class="li"><span class="sw" style="background:${CH.income}"></span>${t("occupied")}: <b style="color:var(--text)">${occ.rented}</b></span>
        <span class="li"><span class="sw" style="background:${CH.gray}"></span>${t("free_units")}: <b style="color:var(--text)">${occ.free}</b></span>
      </div></div></div>`;
}

function netChart(housesNet){
  const byCur = {};
  housesNet.forEach(h => {
    Object.entries(h.net).forEach(([cur, v]) => {
      (byCur[cur] = byCur[cur] || []).push({address:h.address, v});
    });
  });
  let html = "";
  Object.entries(byCur).forEach(([cur, rows]) => {
    rows.sort((a,b)=>b.v-a.v);
    rows = rows.slice(0, 8);
    const maxAbs = Math.max(...rows.map(r=>Math.abs(r.v)), 1);
    html += `<div class="viz-root"><div class="vtitle">${t("net_by_house")} — ${cur === "USD" ? "USD" : "UZS"}</div>` +
      rows.map(r => {
        const w = Math.max(3, Math.abs(r.v)/maxAbs*100);
        const color = r.v >= 0 ? CH.income : CH.neg;
        return `<div class="nrow bar-hit" data-tip="${esc(`<b>${r.address}</b><br>${fmt(r.v,cur)}`)}">
          <div class="nname">${esc(r.address)}</div>
          <div class="ntrack"><div class="nbar" style="width:${w}%;background:${color}"></div>
          <span class="nval" style="color:${r.v>=0?'var(--sec)':'var(--red)'}">${fmtC(r.v)}</span></div></div>`;
      }).join("") + `</div>`;
  });
  return html;
}

function attachChartTips(root){
  root.querySelectorAll(".bar-hit").forEach(el => {
    const html = el.dataset.tip;
    if (!html) return;
    el.addEventListener("mouseenter", e => showTip(html, e.clientX, e.clientY));
    el.addEventListener("mousemove", e => showTip(html, e.clientX, e.clientY));
    el.addEventListener("mouseleave", hideTip);
    el.addEventListener("touchstart", e => {
      const tch = e.touches[0];
      showTip(html, tch.clientX, tch.clientY);
    }, {passive:true});
  });
}

/* ================= reports ================= */
async function renderReports(){
  const c = document.getElementById("content");
  c.innerHTML = `<div class="empty">…</div>`;
  let r, an;
  try {
    [r, an] = await Promise.all([api("/api/reports"), api("/api/analytics")]);
  } catch(e){ toast(e.message); return; }
  const cn = r.counts;
  let html = `<div class="stat-grid">
    <div class="stat"><div class="n" style="color:var(--gold-2)">${cn.sale}</div><div class="l">🏷 ${t("in_sale")}</div></div>
    <div class="stat"><div class="n" style="color:var(--emerald)">${cn.rent_free}</div><div class="l">🔑 ${t("free_rent")}</div></div>
    <div class="stat"><div class="n" style="color:#7ab2f2">${cn.rented}</div><div class="l">👥 ${t("rented_c")}</div></div>
    <div class="stat"><div class="n" style="color:var(--sec)">${cn.sold}</div><div class="l">✅ ${t("sold_c")}</div></div>
  </div>`;

  html += `<div class="section-title">⚠️ ${t("debtors")}</div>`;
  if (!r.debtors.length) html += `<div class="card">${t("no_debtors")}</div>`;
  else html += r.debtors.map(d => `<div class="card">
    <div class="row"><div class="big">${esc(d.name)}</div>
      <span class="chip red">${d.overdue_days>0?`${d.overdue_days} ${t("overdue_days")}`:t("due_today")}</span></div>
    <div class="muted">🏠 ${esc(d.address)}</div>
    ${d.phone?`<div class="muted">📞 <a href="tel:${esc(d.phone)}">${esc(d.phone)}</a></div>`:""}
    <div class="muted">💰 ${fmt(d.rent_amount,d.rent_currency)} · ${t("due_day_short")}: ${d.due_day}</div>
    <div class="btn-row"><button class="btn small" onclick="openPayForm(${d.id},null)">💵 ${t("add_payment")}</button></div>
  </div>`).join("");

  const m = r.month;
  html += `<div class="section-title">📅 ${t("month_sum")} — ${t("months")[m.month-1]} ${m.year}</div>
    <div class="card">
      <div class="list-line row"><span class="muted">📈 ${t("income")}</span><b>${moneyList(m.income)}</b></div>
      <div class="list-line row"><span class="muted">🧾 ${t("month_exp")}</span><b>${moneyList(m.expense)}</b></div>
      <div class="list-line row"><span class="muted">🏷 ${t("month_sales")}</span><b>${moneyList(m.sales)}</b></div>
    </div>`;

  // analytics
  html += `<div class="section-title">📊 ${t("analytics")}</div>`;
  const curs = new Set();
  an.monthly.forEach(mm => {
    Object.keys(mm.income).forEach(cu=>curs.add(cu));
    Object.keys(mm.expense).forEach(cu=>curs.add(cu));
  });
  if (!curs.size && !an.occupancy.rented && !an.occupancy.free){
    html += `<div class="card muted">${t("no_data")}</div>`;
  } else {
    ["UZS","USD"].forEach(cu => { if (curs.has(cu)) html += ieChart(an.monthly, cu); });
    html += occupancyChart(an.occupancy);
    html += netChart(an.houses_net);
  }
  c.innerHTML = html;
  attachChartTips(c);
}

/* ================= settings ================= */
async function renderSettings(){
  const c = document.getElementById("content");
  const u = STATE.user;
  let html = `<div class="section-title">👤 ${t("profile")}</div><div class="card">
    <label>${t("name")}</label><input id="st_name" value="${esc(u.name||"")}">
    <label>${t("language")}</label>
    <div class="seg" id="st_lang">
      <button type="button" data-v="ru">Русский</button>
      <button type="button" data-v="uz">O'zbekcha</button></div>
    <label>${t("new_password")}</label><input id="st_pass" type="password" autocomplete="new-password">
    <label>${t("tg_chat")}</label><input id="st_tg" inputmode="numeric" value="${esc(u.tg_chat_id||"")}">
    <div class="muted" style="margin-top:8px;font-size:12.5px">${u.tg_enabled ? t("tg_hint") : "⚠️ " + t("tg_off")}</div>
    <button class="btn" onclick="saveProfile()">${t("save")}</button>
    ${u.tg_enabled?`<button class="btn secondary" onclick="testTg()">🔔 ${t("tg_test")}</button>`:""}
  </div>`;
  if (u.role === "admin"){
    html += `<div class="section-title">🌐 ${t("share_title")}</div><div class="card">
      <div class="muted" style="font-size:12.5px">${t("share_hint")}</div>
      <label>${t("agency_name_l")}</label><input id="org_name">
      <label>${t("contact_phone_l")}</label><input id="org_phone" inputmode="tel">
      <button class="btn" onclick="saveOrg()">${t("save")}</button>
      <div class="btn-row">
        <button class="btn small secondary" onclick="copyVal(this)" data-v="${location.origin}/share">📋 ${t("copy_link")}</button>
        <button class="btn small secondary" onclick="window.open('/share','_blank')">🔗 ${t("open_link")}</button>
      </div>
      <div class="muted" style="margin-top:8px;font-size:12.5px;word-break:break-all">${location.origin}/share</div>
    </div>`;
    html += `<div class="section-title">👥 ${t("users")}</div><div class="card" id="usersCard">…</div>
    <div class="card">
      <label>${t("username")}</label><input id="nu_user" autocomplete="off">
      <label>${t("password")}</label><input id="nu_pass" autocomplete="new-password">
      <label>${t("name")}</label><input id="nu_name">
      <label>${t("role")}</label>
      <div class="seg" id="nu_role">
        <button type="button" data-v="user">${t("user")}</button>
        <button type="button" data-v="admin">${t("admin")}</button></div>
      <button class="btn" onclick="createUser()">➕ ${t("add_user")}</button>
    </div>`;
  }
  html += `<button class="btn danger" onclick="logout()">🚪 ${t("logout")}</button>`;
  c.innerHTML = html;
  segInit("st_lang", LANG);
  if (u.role === "admin"){
    segInit("nu_role","user"); loadUsers();
    api("/api/org").then(o => {
      const n = document.getElementById("org_name"), p = document.getElementById("org_phone");
      if (n) n.value = o.agency_name || "";
      if (p) p.value = o.contact_phone || "";
    }).catch(()=>{});
  }
}
async function saveOrg(){
  try {
    await api("/api/org","POST",{
      agency_name: document.getElementById("org_name").value.trim(),
      contact_phone: document.getElementById("org_phone").value.trim() });
    toast(t("saved"));
  } catch(e){ toast(e.message); }
}
async function loadUsers(){
  try {
    const users = await api("/api/users");
    document.getElementById("usersCard").innerHTML = users.map(x =>
      `<div class="list-line row"><div><b>${esc(x.name||x.username)}</b>
        <div class="muted">@${esc(x.username)} · ${t(x.role)}</div></div>
        ${x.id!==STATE.user.id?`<button class="btn small danger" onclick="delUser(${x.id})">✕</button>`:""}</div>`).join("");
  } catch(e){}
}
async function saveProfile(){
  const newLang = segVal("st_lang");
  try {
    await api("/api/profile","POST",{
      name: document.getElementById("st_name").value.trim() || null,
      lang: newLang,
      tg_chat_id: document.getElementById("st_tg").value.trim(),
      password: document.getElementById("st_pass").value || null });
    STATE.user.name = document.getElementById("st_name").value.trim();
    STATE.user.tg_chat_id = document.getElementById("st_tg").value.trim();
    if (newLang !== LANG){ LANG = newLang; localStorage.setItem("uyweb_lang", LANG); applyI18n(); }
    toast(t("saved")); renderSettings();
  } catch(e){ toast(e.message); }
}
async function testTg(){
  try { await api("/api/test-telegram","POST"); toast("✅"); }
  catch(e){ toast(e.message); }
}
async function createUser(){
  try {
    await api("/api/users","POST",{
      username: document.getElementById("nu_user").value.trim(),
      password: document.getElementById("nu_pass").value,
      name: document.getElementById("nu_name").value.trim() || null,
      role: segVal("nu_role") });
    toast(t("added")); renderSettings();
  } catch(e){ toast(e.message); }
}
async function delUser(uid){
  if (!confirm("OK?")) return;
  try { await api("/api/users/"+uid,"DELETE"); loadUsers(); } catch(e){ toast(e.message); }
}
async function logout(){
  try { await api("/api/logout","POST"); } catch(e){}
  location.reload();
}

boot();
</script>

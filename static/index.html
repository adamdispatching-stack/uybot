<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>UyWeb</title>
<style>
:root{
  --bg:#f4f5f7; --card:#ffffff; --text:#1a1d21; --muted:#6b7280;
  --brand:#2563eb; --brand-dark:#1d4ed8; --green:#059669; --red:#dc2626;
  --amber:#d97706; --blue:#2563eb; --border:#e5e7eb; --radius:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);font-size:16px;
  padding-bottom:calc(70px + env(safe-area-inset-bottom))}
h1,h2,h3{margin:0}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px;width:100%;padding:12px;
  border:1.5px solid var(--border);border-radius:10px;background:#fff;color:var(--text);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--brand)}
label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:12px 0 5px}
.hide{display:none!important}

/* header */
header{position:sticky;top:0;z-index:20;background:var(--brand);color:#fff;
  padding:calc(12px + env(safe-area-inset-top)) 16px 12px;display:flex;
  justify-content:space-between;align-items:center}
header .title{font-size:18px;font-weight:700}
.lang-btn{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:20px;
  padding:6px 14px;font-size:14px;font-weight:600}

/* bottom nav */
nav{position:fixed;bottom:0;left:0;right:0;z-index:20;background:#fff;
  border-top:1px solid var(--border);display:flex;
  padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;padding:8px 0 6px;font-size:11px;
  color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px}
nav button .ico{font-size:22px}
nav button.active{color:var(--brand);font-weight:700}

/* content */
main{padding:14px 14px 20px;max-width:640px;margin:0 auto}
.card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;
  box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card.tap{cursor:pointer}
.card.tap:active{transform:scale(.99)}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.muted{color:var(--muted);font-size:13px}
.big{font-size:18px;font-weight:700}
.chip{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.chip.green{background:#d1fae5;color:#065f46}
.chip.blue{background:#dbeafe;color:#1e40af}
.chip.red{background:#fee2e2;color:#991b1b}
.chip.amber{background:#fef3c7;color:#92400e}
.chip.gray{background:#e5e7eb;color:#374151}

/* filters */
.filters{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;-webkit-overflow-scrolling:touch}
.filters button{white-space:nowrap;border:1.5px solid var(--border);background:#fff;
  border-radius:20px;padding:7px 14px;font-size:14px;font-weight:600;color:var(--muted)}
.filters button.active{background:var(--brand);border-color:var(--brand);color:#fff}

/* buttons */
.btn{display:block;width:100%;background:var(--brand);color:#fff;border:none;
  border-radius:12px;padding:14px;font-size:16px;font-weight:700;margin-top:16px}
.btn:active{background:var(--brand-dark)}
.btn.secondary{background:#fff;color:var(--brand);border:1.5px solid var(--brand)}
.btn.danger{background:#fff;color:var(--red);border:1.5px solid var(--red)}
.btn.small{width:auto;display:inline-block;padding:9px 16px;font-size:14px;margin-top:0}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn-row .btn{margin-top:0;flex:1;min-width:130px}

/* FAB */
.fab{position:fixed;right:18px;bottom:calc(84px + env(safe-area-inset-bottom));z-index:19;
  width:58px;height:58px;border-radius:50%;background:var(--brand);color:#fff;border:none;
  font-size:30px;box-shadow:0 4px 14px rgba(37,99,235,.45);line-height:1}

/* overlay sheet */
.sheet{position:fixed;inset:0;z-index:40;background:var(--bg);overflow-y:auto;
  padding-bottom:40px;animation:slideup .18s ease-out}
@keyframes slideup{from{transform:translateY(30px);opacity:.5}to{transform:none;opacity:1}}
.sheet .bar{position:sticky;top:0;z-index:5;background:var(--brand);color:#fff;
  padding:calc(12px + env(safe-area-inset-top)) 14px 12px;display:flex;align-items:center;gap:10px}
.sheet .bar button{background:none;border:none;color:#fff;font-size:24px;padding:0 4px}
.sheet .bar .title{font-size:17px;font-weight:700;flex:1}
.sheet .inner{padding:14px;max-width:640px;margin:0 auto}

/* modal */
.modal-bg{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.45);display:flex;
  align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:640px;
  max-height:88vh;overflow-y:auto;padding:18px 16px calc(24px + env(safe-area-inset-bottom));
  animation:slideup .18s ease-out}
.modal h3{font-size:17px;margin-bottom:4px}

.seg{display:flex;gap:8px}
.seg button{flex:1;border:1.5px solid var(--border);background:#fff;border-radius:10px;
  padding:11px;font-size:15px;font-weight:600;color:var(--muted)}
.seg button.active{border-color:var(--brand);color:var(--brand);background:#eff6ff}

.list-line{padding:9px 0;border-bottom:1px solid var(--border);font-size:14px}
.list-line:last-child{border-bottom:none}
.section-title{font-size:14px;font-weight:700;color:var(--muted);margin:18px 0 8px;
  text-transform:uppercase;letter-spacing:.4px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:#fff;border-radius:var(--radius);padding:14px;
  box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat .n{font-size:26px;font-weight:800}
.stat .l{font-size:12.5px;color:var(--muted);font-weight:600}
.empty{color:var(--muted);text-align:center;padding:34px 10px;font-size:15px}
.toast{position:fixed;left:50%;transform:translateX(-50%);z-index:99;
  bottom:calc(90px + env(safe-area-inset-bottom));background:#1a1d21;color:#fff;
  padding:11px 20px;border-radius:24px;font-size:14.5px;font-weight:600;
  box-shadow:0 4px 14px rgba(0,0,0,.3);max-width:88vw}
.login-wrap{max-width:380px;margin:0 auto;padding:56px 22px}
.login-wrap .logo{text-align:center;font-size:44px}
.login-wrap h1{text-align:center;font-size:22px;margin:8px 0 26px}
.err{color:var(--red);font-size:14px;margin-top:10px;text-align:center}
</style>
</head>
<body>

<!-- ===== LOGIN / SETUP ===== -->
<div id="authView" class="hide">
  <div class="login-wrap">
    <div class="logo">🏠</div>
    <h1 id="authTitle">UyWeb</h1>
    <div id="setupHint" class="muted hide" style="text-align:center;margin-bottom:14px"></div>
    <label data-i18n="username"></label>
    <input id="authUser" autocomplete="username">
    <label data-i18n="password"></label>
    <input id="authPass" type="password" autocomplete="current-password">
    <div id="authNameWrap" class="hide">
      <label data-i18n="your_name"></label>
      <input id="authName">
    </div>
    <button class="btn" id="authBtn"></button>
    <div id="authErr" class="err hide"></div>
    <div style="text-align:center;margin-top:22px">
      <button class="lang-btn" style="background:#e5e7eb;color:#374151" onclick="toggleLang()">RU / UZ</button>
    </div>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div id="mainView" class="hide">
  <header>
    <div class="title">🏠 UyWeb</div>
    <button class="lang-btn" onclick="toggleLang()"><span id="langLabel">UZ</span></button>
  </header>
  <main id="content"></main>
  <button class="fab hide" id="fab" onclick="openHouseForm()">+</button>
  <nav>
    <button id="tab-houses" onclick="setTab('houses')"><span class="ico">🏠</span><span data-i18n="tab_houses"></span></button>
    <button id="tab-tenants" onclick="setTab('tenants')"><span class="ico">👥</span><span data-i18n="tab_tenants"></span></button>
    <button id="tab-reports" onclick="setTab('reports')"><span class="ico">📊</span><span data-i18n="tab_reports"></span></button>
    <button id="tab-settings" onclick="setTab('settings')"><span class="ico">⚙️</span><span data-i18n="tab_settings"></span></button>
  </nav>
</div>

<div id="overlays"></div>

let LANG = localStorage.getItem("uyweb_lang") || "ru";
const t = k => (I18N[LANG] && I18N[LANG][k]) || I18N.ru[k] || k;

function applyI18n(){
  document.querySelectorAll("[data-i18n]").forEach(el => el.textContent = t(el.dataset.i18n));
  const ll = document.getElementById("langLabel");
  if (ll) ll.textContent = LANG === "ru" ? "UZ" : "RU";
}
async function toggleLang(){
  LANG = LANG === "ru" ? "uz" : "ru";
  localStorage.setItem("uyweb_lang", LANG);
  if (STATE.user) { try { await api("/api/profile","POST",{lang:LANG}); } catch(e){} }
  applyI18n(); renderAuth(); if (STATE.user) setTab(STATE.tab);
}

/* ================= helpers ================= */
const STATE = { user:null, tab:"houses", filter:"all", houses:[] };

function fmt(a, cur){
  if (a === null || a === undefined) return "—";
  const n = a === Math.trunc(a) ? Math.trunc(a).toLocaleString("ru-RU")
        : a.toLocaleString("ru-RU",{maximumFractionDigits:2});
  return cur === "USD" ? "$" + n : n + " " + t("sum");
}
function fmtDate(iso){
  if (!iso) return "—";
  const [y,m,d] = iso.slice(0,10).split("-");
  return `${d}.${m}.${y}`;
}
function esc(s){ return (s ?? "").toString().replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function moneyList(rows){ return rows && rows.length
  ? rows.map(r => fmt(r.total, r.currency)).join(" + ") : "—"; }

async function api(path, method="GET", body=null){
  const opt = { method, headers:{} };
  if (body){ opt.headers["Content-Type"]="application/json"; opt.body = JSON.stringify(body); }
  const r = await fetch(path, opt);
  let data = {};
  try { data = await r.json(); } catch(e){}
  if (!r.ok) throw new Error(data.error || t("error"));
  return data;
}

let toastTimer;
function toast(msg){
  document.querySelectorAll(".toast").forEach(e=>e.remove());
  const el = document.createElement("div");
  el.className = "toast"; el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.remove(), 2400);
}

function closeModal(){ document.querySelectorAll(".modal-bg").forEach(e=>e.remove()); }
function closeSheet(){ document.querySelectorAll(".sheet").forEach(e=>e.remove()); }
function modal(html){
  closeModal();
  const bg = document.createElement("div");
  bg.className = "modal-bg";
  bg.innerHTML = `<div class="modal">${html}</div>`;
  bg.addEventListener("click", e => { if (e.target === bg) closeModal(); });
  document.getElementById("overlays").appendChild(bg);
  return bg;
}
function sheet(title, html){
  closeSheet();
  const el = document.createElement("div");
  el.className = "sheet";
  el.innerHTML = `<div class="bar"><button onclick="closeSheet()">←</button>
    <div class="title">${esc(title)}</div></div><div class="inner">${html}</div>`;
  document.getElementById("overlays").appendChild(el);
  return el;
}
function segInit(id, def){
  const wrap = document.getElementById(id);
  if (!wrap) return;
  wrap.querySelectorAll("button").forEach(b => {
    if (b.dataset.v === def) b.classList.add("active");
    b.onclick = () => { wrap.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active"); };
  });
}
function segVal(id){ const b = document.querySelector(`#${id} button.active`); return b ? b.dataset.v : null; }
function currencySeg(id, def="UZS"){
  return `<div class="seg" id="${id}">
    <button type="button" data-v="UZS">UZS (${t("sum")})</button>
    <button type="button" data-v="USD">USD ($)</button></div>`;
}
function monthOptions(){
  const now = new Date(); let out = "";
  for (let off = 1; off >= -10; off--){
    const d = new Date(now.getFullYear(), now.getMonth() + off, 1);
    const v = `${d.getFullYear()}-${d.getMonth()+1}`;
    const sel = off === 0 ? "selected" : "";
    out += `<option value="${v}" ${sel}>${t("months")[d.getMonth()]} ${d.getFullYear()}</option>`;
  }
  return out;
}

/* ================= auth ================= */
let NEEDS_SETUP = false;
function renderAuth(){
  document.getElementById("authBtn").textContent = NEEDS_SETUP ? t("setup") : t("login");
  const hint = document.getElementById("setupHint");
  hint.classList.toggle("hide", !NEEDS_SETUP);
  hint.textContent = t("setup_hint");
  document.getElementById("authNameWrap").classList.toggle("hide", !NEEDS_SETUP);
  applyI18n();
}
async function boot(){
  applyI18n();
  try {
    const s = await api("/api/state");
    NEEDS_SETUP = s.needs_setup;
    if (s.user){
      STATE.user = s.user;
      if (s.user.lang && s.user.lang !== LANG){ LANG = s.user.lang; localStorage.setItem("uyweb_lang", LANG); }
      showMain(); return;
    }
  } catch(e){}
  document.getElementById("authView").classList.remove("hide");
  renderAuth();
}
document.getElementById("authBtn").onclick = async () => {
  const u = document.getElementById("authUser").value.trim();
  const p = document.getElementById("authPass").value;
  const err = document.getElementById("authErr");
  err.classList.add("hide");
  try {
    if (NEEDS_SETUP)
      await api("/api/setup","POST",{username:u,password:p,name:document.getElementById("authName").value.trim()||null});
    else
      await api("/api/login","POST",{username:u,password:p});
    const s = await api("/api/state");
    STATE.user = s.user;
    if (s.user.lang && s.user.lang !== LANG){ LANG = s.user.lang; localStorage.setItem("uyweb_lang", LANG); }
    document.getElementById("authView").classList.add("hide");
    showMain();
  } catch(e){

/* ================= tabs ================= */
function setTab(tab){
  STATE.tab = tab;
  closeSheet(); closeModal();
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  document.getElementById("fab").classList.toggle("hide", tab !== "houses");
  ({houses:renderHouses, tenants:renderTenants, reports:renderReports, settings:renderSettings}[tab])();
}

const ST_CHIP = {available:"green", rented:"blue", sold:"gray", reserved:"amber"};
async function renderHouses(){
  const c = document.getElementById("content");
  const filters = ["all","sale","rent_free","rented","sold"];
  c.innerHTML = `<div class="filters">` + filters.map(f =>
    `<button class="${STATE.filter===f?'active':''}" onclick="STATE.filter='${f}';renderHouses()">${t("f_"+f)}</button>`
  ).join("") + `</div><div id="houseList"><div class="empty">…</div></div>`;
  let houses;
  try { houses = await api("/api/houses?flt="+STATE.filter); } catch(e){ toast(e.message); return; }
  STATE.houses = houses;
  const list = document.getElementById("houseList");
  if (!houses.length){ list.innerHTML = `<div class="empty">${esc(t("no_houses"))}</div>`; return; }
  list.innerHTML = houses.map(h => {
    let sub = `<span class="chip ${h.deal_type==='sale'?'amber':'blue'}">${t("deal_"+h.deal_type)}</span>
      <span class="chip ${ST_CHIP[h.status]}">${t("st_"+h.status)}</span>`;
    let extra = "";
    if (h.tenant_name){
      const pd = h.paid_this_month;
      extra = `<div class="muted" style="margin-top:6px">👤 ${esc(h.tenant_name)} ·
        ${fmt(h.rent_amount,h.rent_currency)}
        <span class="chip ${pd?'green':'red'}" style="margin-left:4px">${pd?t("paid"):t("not_paid")}</span></div>`;
    } else if (h.purchase_price){
      extra = `<div class="muted" style="margin-top:6px">💰 ${t("bought_for")}: ${fmt(h.purchase_price,h.purchase_currency)}</div>`;
    }
    return `<div class="card tap" onclick="openHouse(${h.id})">
      <div class="row"><div class="big">${esc(h.address)}</div></div>
      ${h.district?`<div class="muted">🗺 ${esc(h.district)}</div>`:""}
      <div style="margin-top:7px;display:flex;gap:6px;flex-wrap:wrap">${sub}</div>
      ${extra}</div>`;
  }).join("");
}

function houseDetailHtml(h){
  let html = `<div class="card">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
      <span class="chip ${h.deal_type==='sale'?'amber':'blue'}">${t("deal_"+h.deal_type)}</span>
      <span class="chip ${ST_CHIP[h.status]}">${t("st_"+h.status)}</span>
    </div>
    ${h.district?`<div class="list-line">🗺 ${esc(h.district)}</div>`:""}
    ${h.owner_name?`<div class="list-line">👤 ${t("owner")}: <b>${esc(h.owner_name)}</b>${h.owner_phone?` · <a href="tel:${esc(h.owner_phone)}">${esc(h.owner_phone)}</a>`:""}</div>`:""}
    ${h.purchase_price?`<div class="list-line">💰 ${t("bought_for")}: <b>${fmt(h.purchase_price,h.purchase_currency)}</b></div>`:""}
    ${h.rent_income.length?`<div class="list-line">📈 ${t("rent_income")}: <b>${moneyList(h.rent_income)}</b></div>`:""}
    ${h.expenses_total.length?`<div class="list-line">🧾 ${t("expenses")}: <b>${moneyList(h.expenses_total)}</b></div>`:""}
    ${h.status==='sold'&&h.sale_price?`<div class="list-line">✅ ${t("sold_for")}: <b>${fmt(h.sale_price,h.sale_currency)}</b>${h.sale_buyer?` (${esc(h.sale_buyer)})`:""} · ${fmtDate(h.sale_date)}</div>`:""}
    ${h.profit!==undefined?`<div class="list-line">💹 ${t("profit")}: <b style="color:${h.profit>=0?'var(--green)':'var(--red)'}">${fmt(h.profit,h.profit_currency)}</b></div>`:""}
    ${h.notes?`<div class="list-line muted">📝 ${esc(h.notes)}</div>`:""}
  </div>`;

  // tenant block
  if (h.tenant){
    const tn = h.tenant, pd = tn.paid_this_month;
    html += `<div class="section-title">👥 ${t("tenant")}</div><div class="card">
      <div class="row"><div class="big">${esc(tn.name)}</div>
        <span class="chip ${pd?'green':'red'}">${pd?t("paid"):t("not_paid")}</span></div>
      ${tn.phone?`<div class="list-line">📞 <a href="tel:${esc(tn.phone)}">${esc(tn.phone)}</a></div>`:""}
      ${tn.passport?`<div class="list-line">🪪 ${esc(tn.passport)}</div>`:""}
      <div class="list-line">💰 ${fmt(tn.rent_amount,tn.rent_currency)} / ${LANG==='uz'?'oy':'мес'} · ${t("due_day_short")}: ${tn.due_day}</div>
      <div class="list-line">📅 ${fmtDate(tn.move_in)} →</div>
      <div class="btn-row">
        <button class="btn small" onclick="openPayForm(${tn.id},${h.id})">💵 ${t("add_payment")}</button>
        <button class="btn small danger" onclick="moveOut(${tn.id},${h.id})">🚪 ${t("move_out")}</button>
      </div></div>`;
  } else if (h.deal_type === "rent" && h.status !== "sold"){
    html += `<button class="btn" onclick="openMoveInForm(${h.id})">👥 ${t("move_in")}</button>`;
  }

  // actions
  html += `<div class="btn-row">
    <button class="btn small secondary" onclick="openExpenseForm(${h.id})">🧾 ${t("add_expense")}</button>
    <button class="btn small secondary" onclick="openPartnerForm(${h.id})">🤝 ${t("add_partner")}</button>
    ${h.status!=='sold'?`<button class="btn small secondary" onclick="openSoldForm(${h.id})">✅ ${t("mark_sold")}</button>`:""}
    <button class="btn small secondary" onclick="openHouseForm(${h.id})">✏️ ${t("edit_house")}</button>
    <button class="btn small danger" onclick="delHouse(${h.id})">🗑 ${t("delete")}</button>
  </div>`;

  // partners
  if (h.partners.length){
    html += `<div class="section-title">🤝 ${t("partners")}</div><div class="card">` +
      h.partners.map(p => `<div class="list-line row"><div>👤 <b>${esc(p.name)}</b>
        ${p.share!=null?` — ${p.share}%`:""}
        ${p.invested?`<div class="muted">${t("invested")}: ${fmt(p.invested,p.invested_currency)}</div>`:""}</div>
        <button class="btn small danger" onclick="delPartner(${p.id},${h.id})">✕</button></div>`).join("") + `</div>`;
  }

  // payments
  if (h.payments.length){
    html += `<div class="section-title">💵 ${t("payments")}</div><div class="card">` +
      h.payments.map(p => `<div class="list-line row"><div>${fmtDate(p.paid_at)} — <b>${fmt(p.amount,p.currency)}</b>
        <div class="muted">${esc(p.tenant_name)} · ${t("months")[p.period_month-1]} ${p.period_year}${p.note?` · ${esc(p.note)}`:""}</div></div>
        <button class="btn small danger" onclick="delPayment(${p.id},${h.id})">✕</button></div>`).join("") + `</div>`;
  }

  // expenses
  if (h.expenses.length){
    html += `<div class="section-title">🧾 ${t("expenses")}</div><div class="card">` +
      h.expenses.map(e => `<div class="list-line row"><div>${fmtDate(e.spent_at)} — ${t("cat_"+e.category)}: <b>${fmt(e.amount,e.currency)}</b>
        ${e.note?`<div class="muted">${esc(e.note)}</div>`:""}</div>
        <button class="btn small danger" onclick="delExpense(${e.id},${h.id})">✕</button></div>`).join("") +
      `<div class="list-line"><b>${t("total")}: ${moneyList(h.expenses_total)}</b></div></div>`;
  }

  // tenant history
  if (h.history.length){
    html += `<div class="section-title">📜 ${t("history")}</div><div class="card">` +
      h.history.map(x => `<div class="list-line">👤 <b>${esc(x.name)}</b>${x.phone?` · ${esc(x.phone)}`:""}
        <div class="muted">${fmtDate(x.move_in)} → ${x.move_out?fmtDate(x.move_out):`<i>${t("now_living")}</i>`}
        · ${t("total_paid")}: ${fmt(x.total_paid,x.rent_currency)}</div>
        ${x.passport?`<div class="muted">🪪 ${esc(x.passport)}</div>`:""}</div>`).join("") + `</div>`;
  }
  return html;
}

/* ---------- house form (add/edit) ---------- */
function openHouseForm(id){
  const h = id ? null : {};
  const edit = !!id;
  const src = edit ? STATE._editHouse : null;
  const build = (hh) => {
    modal(`<h3>${edit?t("edit_house"):t("add_house")}</h3>
      <label>${t("address")} *</label><input id="hf_address" value="${esc(hh.address||"")}">
      <label>${t("district")}</label><input id="hf_district" value="${esc(hh.district||"")}">
      <label>${t("deal_type")}</label>
      <div class="seg" id="hf_deal">
        <button type="button" data-v="rent">🔑 ${t("deal_rent")}</button>
        <button type="button" data-v="sale">🏷 ${t("deal_sale")}</button></div>
      <label>${t("purchase_price")}</label><input id="hf_price" inputmode="decimal" value="${hh.purchase_price??""}">
      <label>${t("currency")}</label>${currencySeg("hf_cur")}
      <label>${t("owner")}</label><input id="hf_owner" value="${esc(hh.owner_name||"")}">
      <label>${t("owner_phone")}</label><input id="hf_ophone" inputmode="tel" value="${esc(hh.owner_phone||"")}">
      <label>${t("notes")}</label><textarea id="hf_notes" rows="2">${esc(hh.notes||"")}</textarea>
      <button class="btn" onclick="saveHouse(${id||"null"})">${t("save")}</button>
      <button class="btn secondary" onclick="closeModal()">${t("cancel")}</button>`);
    segInit("hf_deal", hh.deal_type || "rent");
    segInit("hf_cur", hh.purchase_currency || "USD");
  };
  if (edit){
    api("/api/houses/"+id).then(hh => { STATE._editHouse = hh; build(hh); }).catch(e=>toast(e.message));
  } else build({});
}
async function saveHouse(id){
  const address = document.getElementById("hf_address").value.trim();
  if (!address){ toast(t("required")); return; }
  const priceRaw = document.getElementById("hf_price").value.trim().replace(/\s/g,"").replace(",",".");
  const price = priceRaw ? parseFloat(priceRaw) : null;
  if (priceRaw && isNaN(price)){ toast(t("required")); return; }
  const body = {
    address, district: document.getElementById("hf_district").value.trim() || null,
    deal_type: segVal("hf_deal"),
    purchase_price: price, purchase_currency: price != null ? segVal("hf_cur") : null,
    owner_name: document.getElementById("hf_owner").value.trim() || null,
    owner_phone: document.getElementById("hf_ophone").value.trim() || null,
    notes: document.getElementById("hf_notes").value.trim() || null,
  };
  try {
    const h = id ? await api("/api/houses/"+id,"PATCH",body) : await api("/api/houses","POST",body);
    toast(t("saved")); closeModal();
    if (STATE.tab === "houses") renderHouses();
    openHouse(h.id);
  } catch(e){ toast(e.message); }
}
async function delHouse(id){
  if (!confirm(t("delete_q"))) return;
  try { await api("/api/houses/"+id,"DELETE"); toast(t("deleted")); closeSheet(); renderHouses(); }
  catch(e){ toast(e.message); }
}

  const u = STATE.user;
  let html = `<div class="section-title">👤 ${t("profile")}</div><div class="card">
    <label>${t("name")}</label><input id="st_name" value="${esc(u.name||"")}">
    <label>${t("language")}</label>
    <div class="seg" id="st_lang">
      <button type="button" data-v="ru">Русский</button>
      <button type="button" data-v="uz">O'zbekcha</button></div>
    <label>${t("new_password")}</label><input id="st_pass" type="password" autocomplete="new-password">
    <label>${t("tg_chat")}</label><input id="st_tg" inputmode="numeric" value="${esc(u.tg_chat_id||"")}">
    <div class="muted" style="margin-top:6px">${u.tg_enabled ? t("tg_hint") : "⚠️ " + t("tg_off")}</div>
    <button class="btn" onclick="saveProfile()">${t("save")}</button>
    ${u.tg_enabled?`<button class="btn secondary" onclick="testTg()">🔔 ${t("tg_test")}</button>`:""}
  </div>`;

  if (u.role === "admin"){
    html += `<div class="section-title">👥 ${t("users")}</div><div class="card" id="usersCard">…</div>
    <div class="card">
      <label>${t("username")}</label><input id="nu_user" autocomplete="off">
      <label>${t("password")}</label><input id="nu_pass" autocomplete="new-password">
      <label>${t("name")}</label><input id="nu_name">
      <label>${t("role")}</label>
      <div class="seg" id="nu_role">
        <button type="button" data-v="user">${t("user")}</button>
        <button type="button" data-v="admin">${t("admin")}</button></div>
      <button class="btn" onclick="createUser()">➕ ${t("add_user")}</button>
    </div>`;
  }
  html += `<button class="btn danger" onclick="logout()">🚪 ${t("logout")}</button>`;
  c.innerHTML = html;
  segInit("st_lang", LANG);
  if (u.role === "admin"){ segInit("nu_role","user"); loadUsers(); }
}
async function loadUsers(){
  try {
    const users = await api("/api/users");
    document.getElementById("usersCard").innerHTML = users.map(x =>
      `<div class="list-line row"><div><b>${esc(x.name||x.username)}</b>
        <div class="muted">@${esc(x.username)} · ${t(x.role)}</div></div>
        ${x.id!==STATE.user.id?`<button class="btn small danger" onclick="delUser(${x.id})">✕</button>`:""}</div>`).join("");
  } catch(e){}
}
async function saveProfile(){
  const newLang = segVal("st_lang");
  try {
    await api("/api/profile","POST",{
      name: document.getElementById("st_name").value.trim() || null,
      lang: newLang,
      tg_chat_id: document.getElementById("st_tg").value.trim(),
      password: document.getElementById("st_pass").value || null });
    STATE.user.name = document.getElementById("st_name").value.trim();
    STATE.user.tg_chat_id = document.getElementById("st_tg").value.trim();
    if (newLang !== LANG){ LANG = newLang; localStorage.setItem("uyweb_lang", LANG); applyI18n(); }
    toast(t("saved")); renderSettings();
  } catch(e){ toast(e.message); }
}
async function testTg(){
  try { await api("/api/test-telegram","POST"); toast("✅"); }
  catch(e){ toast(e.message); }
}
async function createUser(){
  try {
    await api("/api/users","POST",{
      username: document.getElementById("nu_user").value.trim(),
      password: document.getElementById("nu_pass").value,
      name: document.getElementById("nu_name").value.trim() || null,
      role: segVal("nu_role") });
    toast(t("added")); renderSettings();
  } catch(e){ toast(e.message); }
}
async function delUser(uid){
  if (!confirm("OK?")) return;
  try { await api("/api/users/"+uid,"DELETE"); loadUsers(); } catch(e){ toast(e.message); }
}
async function logout(){
  try { await api("/api/logout","POST"); } catch(e){}
  location.reload();
}

boot();
</script>
</body>
</html>

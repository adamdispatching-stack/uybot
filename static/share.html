<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c0e13">
<title>Недвижимость — продажа и аренда</title>
<style>
:root{
  color-scheme:dark;
  --bg:#0c0e13; --card:#151922; --card2:#1b202c;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.12);
  --text:#f2f4f8; --sec:#9aa3b2; --muted:#79808f;
  --gold:#d4af37; --gold-2:#e8c964; --gold-ink:#1a1408; --emerald:#34d399;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);font-size:16px;padding-bottom:40px}
button{font-family:inherit;cursor:pointer}
header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#12151d,#0e1118);
  border-bottom:1px solid var(--border);
  padding:calc(14px + env(safe-area-inset-top)) 18px 13px;
  display:flex;justify-content:space-between;align-items:center;gap:10px}
header .brand{font-size:18px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
header .brand .accent{color:var(--gold)}
.lang-btn{background:rgba(212,175,55,.14);border:1px solid rgba(212,175,55,.35);
  color:var(--gold-2);border-radius:20px;padding:6px 13px;font-size:13px;font-weight:700}
main{padding:16px 14px;max-width:640px;margin:0 auto}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tabs button{flex:1;border:1px solid var(--border2);background:var(--card);border-radius:12px;
  padding:11px;font-size:14.5px;font-weight:700;color:var(--sec)}
.tabs button.active{background:var(--gold);border-color:var(--gold);color:var(--gold-ink)}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;
  margin-bottom:14px;overflow:hidden}
.ph-wrap{position:relative;background:var(--card2)}
.ph-scroll{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none}
.ph-scroll::-webkit-scrollbar{display:none}
.ph-scroll img{width:100%;min-width:100%;height:230px;object-fit:cover;scroll-snap-align:center}
.ph-none{height:150px;display:flex;align-items:center;justify-content:center;font-size:44px;
  opacity:.4}
.ph-count{position:absolute;right:10px;bottom:10px;background:rgba(0,0,0,.6);color:#fff;
  border-radius:14px;padding:3px 10px;font-size:12px;font-weight:700}
.body{padding:14px 16px 16px}
.price{font-size:21px;font-weight:800;color:var(--gold-2)}
.price .per{font-size:13px;color:var(--sec);font-weight:600}
.addr{font-size:15.5px;font-weight:600;margin-top:4px}
.muted{color:var(--sec);font-size:13.5px;margin-top:3px}
.desc{color:var(--sec);font-size:14px;margin-top:9px;line-height:1.5;white-space:pre-line}
.chip{display:inline-block;font-size:11.5px;font-weight:700;padding:4px 11px;border-radius:20px;
  margin-top:10px}
.chip.gold{background:rgba(212,175,55,.15);color:var(--gold-2)}
.chip.blue{background:rgba(57,135,229,.16);color:#7ab2f2}
.empty{color:var(--muted);text-align:center;padding:48px 10px;font-size:15px}
.callbar{position:fixed;bottom:0;left:0;right:0;z-index:10;background:#12151d;
  border-top:1px solid var(--border);padding:10px 14px calc(12px + env(safe-area-inset-bottom));
  display:flex;justify-content:center}
.callbar a{display:block;width:100%;max-width:612px;background:var(--emerald);color:#062b1e;
  text-align:center;text-decoration:none;border-radius:12px;padding:14px;font-size:16px;
  font-weight:800}
</style>
</head>
<body>
<header>
  <div class="brand" id="brand">🏠 Uy<span class="accent">Web</span></div>
  <button class="lang-btn" onclick="toggleLang()"><span id="langLabel">UZ</span></button>
</header>
<main>
  <div class="tabs">
    <button id="tb-sale" onclick="setTab('sale')"></button>
    <button id="tb-rent" onclick="setTab('rent')"></button>
  </div>
  <div id="list"><div class="empty">…</div></div>
</main>
<div class="callbar" id="callbar" style="display:none">
  <a id="callLink" href="#"></a>
</div>

<script>
const I18N = {
  ru:{ sale:"🏷 Продажа", rent:"🔑 Аренда", call:"📞 Позвонить",
       empty:"Пока нет доступных объектов", per_month:"/ месяц", sum:"сум",
       district:"Район", title_sale:"Продажа", title_rent:"Аренда" },
  uz:{ sale:"🏷 Sotuv", rent:"🔑 Ijara", call:"📞 Qo'ng'iroq qilish",
       empty:"Hozircha bo'sh uylar yo'q", per_month:"/ oy", sum:"so'm",
       district:"Tuman", title_sale:"Sotuv", title_rent:"Ijara" },
};
let LANG = localStorage.getItem("uyshare_lang") ||
  (navigator.language||"").startsWith("uz") ? "uz" : "ru";
if (!I18N[LANG]) LANG = "ru";
const t = k => I18N[LANG][k] || k;
let TAB = "sale", DATA = null;

function fmt(a, cur){
  if (a === null || a === undefined) return "";
  const n = a === Math.trunc(a) ? Math.trunc(a).toLocaleString("ru-RU")
        : a.toLocaleString("ru-RU",{maximumFractionDigits:2});
  return cur === "USD" ? "$" + n : n + " " + t("sum");
}
function esc(s){ return (s ?? "").toString().replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function toggleLang(){
  LANG = LANG === "ru" ? "uz" : "ru";
  localStorage.setItem("uyshare_lang", LANG);
  render();
}
function setTab(tab){ TAB = tab; render(); }

function render(){
  document.getElementById("langLabel").textContent = LANG === "ru" ? "UZ" : "RU";
  document.getElementById("tb-sale").textContent = t("sale");
  document.getElementById("tb-rent").textContent = t("rent");
  document.getElementById("tb-sale").className = TAB==="sale" ? "active" : "";
  document.getElementById("tb-rent").className = TAB==="rent" ? "active" : "";
  if (!DATA) return;
  if (DATA.agency_name)
    document.getElementById("brand").textContent = "🏠 " + DATA.agency_name;
  const cb = document.getElementById("callbar"), cl = document.getElementById("callLink");
  if (DATA.contact_phone){
    cb.style.display = "flex";
    cl.textContent = `${t("call")} ${DATA.contact_phone}`;
    cl.href = "tel:" + DATA.contact_phone.replace(/[^+\d]/g,"");
    document.body.style.paddingBottom = "90px";
  }
  const items = DATA.listings.filter(x => x.deal_type === TAB);
  const list = document.getElementById("list");
  if (!items.length){ list.innerHTML = `<div class="empty">${t("empty")}</div>`; return; }
  list.innerHTML = items.map(h => {
    const photos = h.photos.length
      ? `<div class="ph-wrap"><div class="ph-scroll">` +
        h.photos.map(f=>`<img src="/photos/${f}" alt="" loading="lazy">`).join("") +
        `</div>${h.photos.length>1?`<div class="ph-count">📷 ${h.photos.length}</div>`:""}</div>`
      : `<div class="ph-wrap"><div class="ph-none">🏠</div></div>`;
    const price = h.list_price
      ? `<div class="price">${fmt(h.list_price, h.list_currency)}
         ${h.deal_type==="rent"?`<span class="per">${t("per_month")}</span>`:""}</div>` : "";
    return `<div class="card">${photos}<div class="body">
      ${price}
      <div class="addr">📍 ${esc(h.address)}</div>
      ${h.district?`<div class="muted">${t("district")}: ${esc(h.district)}</div>`:""}
      ${h.public_desc?`<div class="desc">${esc(h.public_desc)}</div>`:""}
      <span class="chip ${h.deal_type==='sale'?'gold':'blue'}">${t(h.deal_type==='sale'?'title_sale':'title_rent')}</span>
    </div></div>`;
  }).join("");
}

fetch("/api/public/listings").then(r=>r.json()).then(d => { DATA = d; render(); });
render();
</script>
</body>
</html>
